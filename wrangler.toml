# Template publico de deploy.
#
# Regras:
# - Este arquivo pode ir para o GitHub porque nao contem segredos nem IDs reais.
# - O Deploy Button/Workers Builds le este arquivo para descobrir bindings e provisionar D1.
# - Para deploy manual com valores reais, copie para wrangler.local.toml.
# - Nunca faca commit de wrangler.local.toml, database_id real, tokens ou secrets.

name = "lockbrief"
main = "src/index.ts"
compatibility_date = "2024-12-01"
keep_vars = true

[[d1_databases]]
binding = "DB"
database_name = "lockbrief"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[triggers]
crons = ["*/30 * * * *"]

[observability]
enabled = true
head_sampling_rate = 0.1

[assets]
directory = "./dist"
